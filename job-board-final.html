  body { font-family: 'DM Sans', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; }

  .logo-sub { font-size: 12px; color: #555; margin-left: 4px; }

  .search-wrap input:focus { border-color: #1a1a1a; }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 15px; color: #bbb; }

  .card-titles { min-width: 0; }
  .card-title { font-size: 14px; font-weight: 600; color: #1a1a1a; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-sub { font-size: 11px; color: #888; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .status-select { font-size: 10px; padding: 3px 8px; border-radius: 20px; border: 1px solid; cursor: pointer; font-family: 'DM Mono', monospace; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; outline: none; appearance: none; flex-shrink: 0; }
  .status-New { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
  .status-Reviewed { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
  .status-Applied { background: #fefce8; color: #854d0e; border-color: #fef08a; }
  .status-Pass { background: #f9fafb; color: #6b7280; border-color: #e5e7eb; }
  .pills { display: flex; flex-wrap: wrap; gap: 4px; }
  .pill { font-size: 11px; padding: 2px 8px; border-radius: 20px; }
  .pill-loc { background: #f0f0ec; color: #666; }
  .pill-remote { background: #eff6ff; color: #1d4ed8; }
  .pill-hybrid { background: #fefce8; color: #92400e; }
  .pill-type { background: #1a1a1a; color: #e8e6e0; }
  .pill-salary { background: #f0fdf4; color: #15803d; }
  .skills-label { font-family: 'DM Mono', monospace; font-size: 10px; color: #ccc; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
  .skill-tags { display: flex; flex-wrap: wrap; gap: 3px; }

  .resp { font-size: 11px; color: #888; line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-footer { display: flex; justify-content: space-between; align-items: flex-end; padding-top: 8px; border-top: 1px solid #f2f2f0; }
  .recruiter { font-size: 11px; color: #aaa; line-height: 1.5; min-width: 0; overflow: hidden; }

  .recruiter a { color: #aaa; text-decoration: none; font-size: 10px; }

  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-size: 16px; font-weight: 500; color: #999; margin-bottom: 6px; }
  @media (max-width: 600px) { .main { padding: 1rem; } .topbar { padding: 0.85rem 1rem; } .grid { grid-template-columns: 1fr; } }
</style>

let statusMap = {};

async function loadStatuses() {
  try {
    const r = await window.storage.get('job_statuses', true);
    if (r?.value) statusMap = JSON.parse(r.value);
  } catch(e) {}
}

async function saveStatus(id, val) {
  statusMap[id] = val;
  try { await window.storage.set('job_statuses', JSON.stringify(statusMap), true); } catch(e) {}
}

function initials(s) {
  if (!s) return '?';
  return s.trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase() || '?';
}

function locClass(l) {
  if (!l) return 'pill-loc';
  const lo = l.toLowerCase();
  if (lo.includes('remote')) return 'pill-remote';
  if (lo.includes('hybrid')) return 'pill-hybrid';
  return 'pill-loc';
}

function skillTags(str) {
  if (!str) return '';
  return str.split(',').map(s=>s.trim()).filter(Boolean).slice(0,5)
    .map(s=>`<span class="skill-tag">${s}</span>`).join('');
}

function render() {
  const q = document.getElementById('q').value.toLowerCase();
  const ft = document.getElementById('f-type').value.toLowerCase();
  const fl = document.getElementById('f-loc').value.toLowerCase();
  const fs = document.getElementById('f-status').value;

  const filtered = JOBS.filter(j => {
    const st = statusMap[j.id] || 'New';
    const text = [j.title,j.company,j.agency,j.must,j.location,j.recruiter,j.resp].join(' ').toLowerCase();
    if (q && !text.includes(q)) return false;
    if (ft && (j.type||'').toLowerCase() !== ft) return false;
    if (fl && !(j.location||'').toLowerCase().includes(fl)) return false;
    if (fs && st !== fs) return false;
    return true;
  });

  document.getElementById('count').textContent = `${filtered.length} jobs`;

  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">◎</div><div class="empty-title">No jobs match</div><p>Try adjusting your filters</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(j => {
    const st = statusMap[j.id] || 'New';
    const sub = j.company || j.agency || '—';
    const showAgency = j.company && j.agency;
    return `<div class="card">
      <div class="card-top">
        <div class="card-left">
          <div class="avatar">${initials(sub)}</div>
          <div class="card-titles">
            <div class="card-title" title="${j.title}">${j.title}</div>
            <div class="card-sub">${sub}</div>
            ${showAgency ? `<div class="card-agency">via ${j.agency}</div>` : ''}
          </div>
        </div>
        <select class="status-select status-${st}" data-id="${j.id}" onchange="handleStatus('${j.id}',this)">
          <option ${st==='New'?'selected':''}>New</option>
          <option ${st==='Reviewed'?'selected':''}>Reviewed</option>
          <option ${st==='Applied'?'selected':''}>Applied</option>
          <option ${st==='Pass'?'selected':''}>Pass</option>
        </select>
      </div>
      <div class="pills">
        ${j.location ? `<span class="pill ${locClass(j.location)}">${j.location}</span>` : ''}
        ${j.type ? `<span class="pill pill-type">${j.type}</span>` : ''}
        ${j.salary ? `<span class="pill pill-salary">${j.salary}</span>` : ''}
      </div>
      ${j.must ? `<div><div class="skills-label">Required</div><div class="skill-tags">${skillTags(j.must)}</div></div>` : ''}
      ${j.resp ? `<div class="resp">${j.resp}</div>` : ''}
      <div class="card-footer">
        <div class="recruiter">
          ${j.recruiter ? `<strong>${j.recruiter}</strong>` : ''}
          ${j.email ? `<a href="mailto:${j.email}">${j.email}</a>` : ''}
          ${j.phone ? `<span style="font-size:10px;color:#bbb;"> · ${j.phone}</span>` : ''}
        </div>
        <div class="card-date">${j.date}</div>
      </div>
    </div>`;
  }).join('');
}

function handleStatus(id, sel) {
  const val = sel.value;
  sel.className = 'status-select status-' + val;
  saveStatus(id, val);
}

function clearFilters() {
  document.getElementById('q').value = '';
  document.getElementById('f-type').value = '';
  document.getElementById('f-loc').value = '';
  document.getElementById('f-status').value = '';
  render();
}

function populateLocs() {
  const locs = [...new Set(JOBS.map(j=>j.location).filter(l=>l&&l.length>2))].sort();
  document.getElementById('f-loc').innerHTML =
    '<option value="">All locations</option>' + locs.map(l=>`<option>${l}</option>`).join('');
}

async function init() {
  await loadStatuses();
  populateLocs();
  render();
}

init();
</script>
